# Upstream definitions\nupstream backend_nodes {\n    least_conn;\n    server backend:3001 max_fails=3 fail_timeout=30s;\n    keepalive 32;\n}\n\nupstream frontend_nodes {\n    least_conn;\n    server frontend:3000 max_fails=3 fail_timeout=30s;\n    keepalive 32;\n}\n\n# Rate limiting\nlimit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;\nlimit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;\nlimit_req_zone $binary_remote_addr zone=search:10m rate=30r/m;\n\n# Security headers map\nmap $sent_http_content_type $nosniff {\n    ~^text/ nosniff;\n}\n\nserver {\n    listen 80;\n    server_name bazaary.shop www.bazaary.shop;\n    \n    # Security headers\n    add_header X-Frame-Options \"SAMEORIGIN\" always;\n    add_header X-Content-Type-Options $nosniff always;\n    add_header X-XSS-Protection \"1; mode=block\" always;\n    add_header Referrer-Policy \"strict-origin-when-cross-origin\" always;\n\n    location /.well-known/acme-challenge/ {\n        root /var/www/certbot;\n    }\n\n    location / {\n        return 301 https://$host$request_uri;\n    }\n}\n\nserver {\n    listen 443 ssl http2;\n    server_name bazaary.shop www.bazaary.shop;\n\n    # SSL Configuration\n    ssl_certificate /etc/letsencrypt/live/bazaary.shop/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/bazaary.shop/privkey.pem;\n    \n    # Modern SSL configuration\n    ssl_protocols TLSv1.2 TLSv1.3;\n    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;\n    ssl_prefer_server_ciphers off;\n    ssl_session_cache shared:SSL:10m;\n    ssl_session_timeout 1d;\n    ssl_session_tickets off;\n    \n    # HSTS (HTTP Strict Transport Security)\n    add_header Strict-Transport-Security \"max-age=63072000; includeSubDomains; preload\" always;\n    \n    # Security Headers\n    add_header X-Frame-Options \"SAMEORIGIN\" always;\n    add_header X-Content-Type-Options \"nosniff\" always;\n    add_header X-XSS-Protection \"1; mode=block\" always;\n    add_header Referrer-Policy \"strict-origin-when-cross-origin\" always;\n    add_header Content-Security-Policy \"default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: ws: https://api.stripe.com; frame-src https://js.stripe.com;\" always;\n\n    # Gzip compression\n    gzip on;\n    gzip_vary on;\n    gzip_min_length 1000;\n    gzip_proxied any;\n    gzip_types\n        text/plain\n        text/css\n        text/js\n        text/xml\n        text/javascript\n        application/javascript\n        application/xml+rss\n        application/json;\n\n    # Connection limiting\n    limit_conn addr 20;\n\n    # Backend API Proxy with enhanced settings\n    location /api {\n        # Rate limiting for API calls\n        limit_req zone=api burst=20 nodelay;\n        \n        proxy_pass http://backend_nodes;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection 'upgrade';\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_set_header X-Forwarded-Host $host;\n        proxy_set_header X-Forwarded-Port $server_port;\n        \n        # Proxy timeouts\n        proxy_connect_timeout 5s;\n        proxy_send_timeout 60s;\n        proxy_read_timeout 60s;\n        \n        # Buffer settings\n        proxy_buffering on;\n        proxy_buffer_size 4k;\n        proxy_buffers 8 4k;\n        proxy_busy_buffers_size 8k;\n        \n        # Cache headers for API responses\n        proxy_cache_bypass $http_upgrade;\n        add_header X-Cache-Status $upstream_cache_status;\n    }\n    \n    # Enhanced rate limiting for auth endpoints\n    location ~ ^/api/auth/(login|register) {\n        limit_req zone=login burst=5 nodelay;\n        \n        proxy_pass http://backend_nodes;\n        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n    }\n    \n    # Search API with specific rate limiting\n    location /api/search {\n        limit_req zone=search burst=10 nodelay;\n        \n        proxy_pass http://backend_nodes;\n        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        \n        # Cache search results briefly\n        proxy_cache_valid 200 1m;\n    }\n\n    # WebSocket / Socket.io Proxy with enhanced configuration\n    location /socket.io {\n        proxy_pass http://backend_nodes;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection \"upgrade\";\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        \n        # WebSocket specific timeouts\n        proxy_connect_timeout 7d;\n        proxy_send_timeout 7d;\n        proxy_read_timeout 7d;\n        \n        # Disable buffering for WebSocket\n        proxy_buffering off;\n    }\n\n    # Static assets caching for Next.js\n    location /_next/static/ {\n        proxy_pass http://frontend_nodes;\n        \n        # Long-term caching for Next.js static assets\n        add_header Cache-Control \"public, max-age=31536000, immutable\";\n        \n        # Compression\n        gzip_static on;\n    }\n    \n    # Frontend Proxy with caching\n    location / {\n        proxy_pass http://frontend_nodes;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection 'upgrade';\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        \n        # Frontend timeouts\n        proxy_connect_timeout 5s;\n        proxy_send_timeout 60s;\n        proxy_read_timeout 60s;\n        \n        proxy_cache_bypass $http_upgrade;\n        \n        # Custom error pages\n        error_page 502 503 504 /50x.html;\n    }\n    \n    # Health check endpoint (bypass upstream, direct nginx response)\n    location /nginx-health {\n        access_log off;\n        return 200 \"nginx healthy\\n\";\n        add_header Content-Type text/plain;\n    }\n    \n    # Custom error page for 5xx errors\n    location = /50x.html {\n        root /usr/share/nginx/html;\n        internal;\n    }\n}